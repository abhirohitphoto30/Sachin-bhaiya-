<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sachin Karunav — Solution Generator</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap');

:root{
  --p:#7c6fff;--a:#00e5ff;--g:#ffd700;--r:#f50057;
  --bg:#0a0a18;--card:#141428;--card2:#0f0f22;
  --txt:#dde0ff;--mut:#6b6b99;--ok:#00e676;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--txt);font-family:'Poppins','Noto Sans Devanagari',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 15% 15%,rgba(124,111,255,.18) 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(0,229,255,.10) 0%,transparent 55%);pointer-events:none;z-index:0;}

/* stars */
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
.star{position:absolute;border-radius:50%;background:#fff;animation:tw var(--d,3s) var(--dl,0s) infinite ease-in-out;opacity:0;}
@keyframes tw{0%,100%{opacity:0;transform:scale(.5)}50%{opacity:var(--o,.7);transform:scale(1)}}

.wrap{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:28px 18px 60px;}

/* ===== HEADER ===== */
.hdr{text-align:center;margin-bottom:40px;animation:fdown .7s ease both;}
@keyframes fdown{from{opacity:0;transform:translateY(-28px)}to{opacity:1;transform:translateY(0)}}

.crown{font-size:40px;display:block;margin-bottom:10px;filter:drop-shadow(0 0 14px rgba(255,215,0,.7));animation:flt 3s ease-in-out infinite;}
@keyframes flt{0%,100%{transform:translateY(0) rotate(-4deg)}50%{transform:translateY(-8px) rotate(4deg)}}

/* profile ring */
.pring-outer{display:inline-block;position:relative;margin-bottom:16px;}
.pring{width:120px;height:120px;border-radius:50%;padding:3px;background:conic-gradient(var(--p),var(--a),var(--g),var(--r),var(--p));animation:spin 6s linear infinite;box-shadow:0 0 28px rgba(124,111,255,.5),0 0 56px rgba(0,229,255,.15);}
@keyframes spin{to{transform:rotate(360deg)}}
.pimg{width:100%;height:100%;border-radius:50%;object-fit:cover;object-position:center top;display:block;border:3px solid var(--bg);}
.pbadge{position:absolute;bottom:2px;right:2px;background:var(--g);border-radius:50%;width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;border:2px solid var(--bg);animation:pop 2.5s ease-in-out infinite;}
@keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.2) rotate(15deg)}}

.name{background:linear-gradient(120deg,var(--p),var(--a));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;font-size:clamp(24px,5.5vw,46px);font-weight:900;letter-spacing:-0.5px;line-height:1.1;}
.sub{font-size:11px;letter-spacing:3.5px;text-transform:uppercase;color:var(--mut);margin-top:5px;}
.sub span{color:var(--g);}

.div{display:flex;align-items:center;gap:10px;margin:14px auto;max-width:360px;}
.dl{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--p),transparent);}

.tag{color:var(--mut);font-size:13.5px;font-weight:300;max-width:520px;margin:0 auto;}
.tag strong{color:var(--a);font-weight:600;}

/* ===== CARD ===== */
.card{background:var(--card);border:1px solid rgba(124,111,255,.18);border-radius:18px;padding:28px;margin-bottom:22px;animation:fup .6s ease both;transition:border-color .3s,box-shadow .3s;}
.card:hover{border-color:rgba(124,111,255,.45);box-shadow:0 6px 28px rgba(124,111,255,.08);}
@keyframes fup{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.card:nth-of-type(2){animation-delay:.1s}.card:nth-of-type(3){animation-delay:.2s}
.ctitle{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--p);margin-bottom:16px;display:flex;align-items:center;gap:7px;}

/* ===== DROP ZONE ===== */
.dropwrap{position:relative;}
.dropzone{border:2px dashed rgba(124,111,255,.35);border-radius:14px;padding:36px 20px;text-align:center;background:rgba(124,111,255,.04);transition:all .3s ease;cursor:pointer;}
.dropzone:hover,.dropzone.over{border-color:var(--p);background:rgba(124,111,255,.10);transform:scale(1.01);}
.dicon{font-size:44px;display:block;margin-bottom:10px;animation:bounce 2.2s ease-in-out infinite;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.dtxt{font-size:14.5px;font-weight:600;}
.dhint{font-size:12px;color:var(--mut);margin-top:5px;}

/* hidden real input triggered by label */
#fi{display:none;}

.chosen{margin-top:12px;background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.28);border-radius:10px;padding:9px 15px;font-size:13px;color:var(--ok);display:none;align-items:center;gap:7px;}

.err{border-radius:10px;padding:12px 16px;font-size:13px;display:none;align-items:center;gap:9px;margin-top:12px;background:rgba(245,0,87,.1);border:1px solid rgba(245,0,87,.28);color:#ff4081;}

/* ===== BUTTONS ===== */
.brow{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px;}
.btn{display:inline-flex;align-items:center;gap:7px;padding:13px 28px;border:none;border-radius:50px;font-size:14.5px;font-weight:700;cursor:pointer;transition:all .22s ease;font-family:inherit;letter-spacing:.4px;}
.bpri{background:linear-gradient(135deg,var(--p),#9c27b0);color:#fff;box-shadow:0 4px 18px rgba(124,111,255,.4);}
.bpri:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(124,111,255,.6);}
.bpri:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:none;}
.bdl{background:linear-gradient(135deg,var(--ok),#00bfa5);color:#0d1a0d;box-shadow:0 4px 18px rgba(0,230,118,.3);}
.bdl:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,230,118,.5);}

/* pulse */
@keyframes pr{0%{box-shadow:0 0 0 0 rgba(124,111,255,.55)}70%{box-shadow:0 0 0 11px rgba(124,111,255,0)}100%{box-shadow:0 0 0 0 rgba(124,111,255,0)}}
.pulse{animation:pr 1.6s infinite;}

/* ===== OUTPUT ===== */
.outhdr{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:14px;}
.bcnt{background:rgba(124,111,255,.18);border:1px solid rgba(124,111,255,.38);color:var(--p);padding:4px 12px;border-radius:50px;font-size:12px;font-weight:600;}
.obox{background:var(--card2);border:1px solid rgba(0,229,255,.14);border-radius:12px;padding:22px;font-family:'Noto Sans Devanagari','Poppins',monospace;font-size:13.5px;line-height:1.9;color:var(--txt);white-space:pre-wrap;word-break:break-word;max-height:480px;overflow-y:auto;display:none;}
.obox::-webkit-scrollbar{width:5px}.obox::-webkit-scrollbar-thumb{background:rgba(124,111,255,.4);border-radius:3px}

.stats{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px;}
.spill{background:rgba(124,111,255,.07);border:1px solid rgba(124,111,255,.18);border-radius:50px;padding:7px 16px;font-size:12.5px;display:flex;align-items:center;gap:5px;}
.spill strong{color:var(--a);}

/* footer */
.foot{text-align:center;color:var(--mut);font-size:12px;margin-top:44px;padding-top:22px;border-top:1px solid rgba(255,255,255,.05);}
.foot .h{color:var(--r);}
.hidden{display:none!important;}
</style>
</head>

var dz=document.getElementById('dz');
var chosen=document.getElementById('chosen');
var cname=document.getElementById('cname');
var errEl=document.getElementById('err');
var errmsg=document.getElementById('errmsg');
var goBtn=document.getElementById('goBtn');
var outCard=document.getElementById('outCard');
var obox=document.getElementById('obox');
var dlBtn=document.getElementById('dlBtn');
var qcnt=document.getElementById('qcnt');
var statsEl=document.getElementById('stats');

var selFile=null;
var outText='';

// Drag events on dz
dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('over');});
dz.addEventListener('dragleave',function(){dz.classList.remove('over');});
dz.addEventListener('drop',function(e){
  e.preventDefault();
  dz.classList.remove('over');
  var f=e.dataTransfer&&e.dataTransfer.files&&e.dataTransfer.files[0];
  if(f) onFile(f);
});

// File input change
fi.addEventListener('change',function(){
  if(fi.files&&fi.files[0]) onFile(fi.files[0]);
});

function onFile(f){
  clearErr();
  if(!f.name.toLowerCase().endsWith('.txt')){
    showErr('सिर्फ .txt files allowed हैं।');
    return;
  }
  selFile=f;
  cname.textContent=f.name+' ('+formatBytes(f.size)+')';
  chosen.style.display='flex';
  goBtn.disabled=false;
  goBtn.classList.add('pulse');
}

function formatBytes(b){
  if(b<1024) return b+' B';
  if(b<1024*1024) return (b/1024).toFixed(1)+' KB';
  return (b/1024/1024).toFixed(2)+' MB';
}

goBtn.addEventListener('click',function(){
  if(!selFile) return;
  goBtn.disabled=true;
  goBtn.textContent='⏳ Processing...';
  var r=new FileReader();
  r.onload=function(e){
    try{
      var res=process(e.target.result);
      outText=res.text;
      showOut(res);
    }catch(ex){
      showErr('Error: '+ex.message);
    }
    goBtn.disabled=false;
    goBtn.innerHTML='⚡ Solution Generate करें';
    goBtn.classList.remove('pulse');
  };
  r.onerror=function(){
    showErr('File read failed. Please try again.');
    goBtn.disabled=false;
    goBtn.innerHTML='⚡ Solution Generate करें';
  };
  r.readAsText(selFile,'UTF-8');
});

// ===== CORE PROCESSING =====
function process(raw){
  // Normalize line endings, remove carriage returns
  var text=raw.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  var lines=text.split('\n');
  var out=[];
  var ZW=/[\u200b\u200c\u200d\ufeff]/g;

  for(var i=0;i<lines.length;i++){
    var line=lines[i];
    out.push(line);

    var clean=line.replace(ZW,'').trim();

    // After every Ex: line, ensure exactly one blank line before next Q
    if(clean.startsWith('Ex:')){
      // Skip ahead past any existing blank/zwsp lines
      var j=i+1;
      while(j<lines.length && lines[j].replace(ZW,'').trim()===''){
        j++;
      }
      // Push the existing blank lines we skipped
      for(var k=i+1;k<j;k++){
        out.push(lines[k]);
      }
      // Now ensure there's at least one blank line
      // Check: did we already have at least one blank?
      var hadBlank=(j>i+1);
      if(!hadBlank){
        // Add a blank line
        out.push('');
      }
      // Jump i to j-1 (loop will i++ to j)
      i=j-1;
    }
  }

  // Collapse multiple consecutive blank lines to one
  var final=[];
  var lastBlank=false;
  for(var x=0;x<out.length;x++){
    var isBlank=out[x].replace(ZW,'').trim()==='';
    if(isBlank){
      if(!lastBlank) final.push('');
      lastBlank=true;
    } else {
      final.push(out[x]);
      lastBlank=false;
    }
  }

  var joined=final.join('\n');
  var qs=final.filter(function(l){return /^Q\d/.test(l.replace(ZW,'').trim());}).length;
  var exs=final.filter(function(l){return l.replace(ZW,'').trim().indexOf('Ex:')=== 0;}).length;

  return {text:joined,q:qs,ex:exs};
}

function showOut(res){
  obox.textContent=res.text;
  obox.style.display='block';
  outCard.classList.remove('hidden');
  qcnt.textContent=res.q+' Questions';
  statsEl.innerHTML=
    '<div class="spill">📝 Questions: <strong>'+res.q+'</strong></div>'+
    '<div class="spill">💡 Explanations: <strong>'+res.ex+'</strong></div>'+
    '<div class="spill">✅ Blank lines added: <strong>'+res.ex+'</strong></div>';
  outCard.scrollIntoView({behavior:'smooth',block:'start'});
}

dlBtn.addEventListener('click',function(){
  if(!outText) return;
  try{
    var blob=new Blob([outText],{type:'text/plain;charset=utf-8'});
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');
    a.href=url;
    var base=selFile?selFile.name.replace(/\.txt$/i,''):'output';
    a.download=base+'_SOLUTION.txt';
    document.body.appendChild(a);
    a.click();
    setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
  }catch(e){
    // fallback for older browsers
    var w=window.open('','_blank');
    if(w){w.document.write('<pre>'+outText.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</pre>');w.document.close();}
  }
});

function showErr(msg){errmsg.textContent=msg;errEl.style.display='flex';}
function clearErr(){errEl.style.display='none';}
</script>
</body>
</html>
